name: Deploy to Xserver

on:
  push:
    branches: ["main"]
    paths:
      - "wp-content/themes/swell_child/**"
      - ".github/workflows/deploy-xserver.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "swell_child"
        type: choice
        options:
          - swell_child

concurrency:
  group: deploy-xserver-production
  cancel-in-progress: false

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy child theme via FTP/FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.XSERVER_FTP_HOST }}
          username: ${{ secrets.XSERVER_FTP_USERNAME }}
          password: ${{ secrets.XSERVER_FTP_PASSWORD }}
          protocol: ${{ vars.XSERVER_FTP_PROTOCOL || 'ftps' }}
          port: ${{ vars.XSERVER_FTP_PORT || 21 }}
          local-dir: ./wp-content/themes/swell_child/
          server-dir: ${{ vars.XSERVER_CHILD_THEME_DIR || '/public_html/wp-content/themes/swell_child/' }}
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.vscode/**
